<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halifax Transit Live • Real-Time Buses</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: Arial, sans-serif; }
        #map { height: 65vh; width: 100%; }
        .header {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 12px 18px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
        .filter {
            position: absolute; top: 70px; left: 10px; z-index: 1000;
            background: white; padding: 10px 14px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .status {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 8px 14px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 14px;
        }
        .bus-icon { font-size: 24px; }
        select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }

        /* Arrivals panel */
        #arrivals-panel {
            padding: 20px; background: #f8f9fa; border-top: 3px solid #0077cc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .arrivals-card {
            max-width: 800px; margin: 0 auto; background: white;
            border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .arrivals-header { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        input[type="text"] {
            padding: 12px; font-size: 18px; border: 2px solid #ccc; border-radius: 8px; width: 220px;
        }
        button {
            padding: 12px 24px; font-size: 18px; background: #0077cc; color: white;
            border: none; border-radius: 8px; cursor: pointer;
        }
        button:hover { background: #005fa3; }
        .results { margin-top: 20px; }
        .result-item {
            padding: 14px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 4px;
        }
        .result-item:last-child { border-bottom: none; }
        .no-results { color: #666; font-style: italic; }
        .time-row { display: flex; gap: 20px; font-size: 15px; }
        .time-label { font-weight: bold; width: 110px; }
    </style>
</head>
<body>
    <div class="header">🚏 Halifax Transit Live Map • <span id="count">0</span> buses on the road</div>
    
    <div class="filter">
        <label for="routeFilter"><strong>Filter by Route:</strong></label>
        <select id="routeFilter">
            <option value="all">All Routes</option>
        </select>
    </div>

    <div class="status" id="status">Loading real-time buses...</div>
    <div id="map"></div>

    <!-- Next Buses at Stop -->
    <div id="arrivals-panel">
        <div class="arrivals-card">
            <div class="arrivals-header">🕒 Next Buses at Stop</div>
            <input id="stopInput" type="text" placeholder="Enter stop number (e.g. 3589)" />
            <button onclick="getNextArrivals()">Get Arrivals</button>
            <div id="arrivals-results" class="results"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/pbf@3.0.5/dist/pbf.js"></script>
    <script src="https://unpkg.com/gtfs-realtime-pbf-js-module@1.0.0/gtfs-realtime.browser.proto.js"></script>

    <script>
        // ==================== MAP CODE ====================
        const map = L.map('map').setView([44.65, -63.58], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors | Halifax Transit data'
        }).addTo(map);

        const busLayer = L.layerGroup().addTo(map);
        let currentFilter = 'all';
        const routeSelect = document.getElementById('routeFilter');

        const fallbackRoutes = ["1","2","3","4","5","8","21","22","24","25","26","28","29","39","50","53","54","55","56","58","59","61","62","63","64","65","67","68","72","82","83","84","85","86","87","88","90","91","93","123","127","135","136","137","138","158","159","161","165","182","183","185","186","192","194","196","320","330","370","401","415","433","51A","51B","168A","168B"];

        routeSelect.addEventListener('change', () => { currentFilter = routeSelect.value; loadLiveBuses(); });

        function populateDropdown(routes) {
            const selected = routeSelect.value;
            routeSelect.innerHTML = '<option value="all">All Routes</option>';
            const sorted = [...new Set(routes)].sort((a, b) => parseInt(a) - parseInt(b) || a.localeCompare(b));
            sorted.forEach(route => {
                const opt = document.createElement('option');
                opt.value = route;
                opt.textContent = `Route ${route}`;
                routeSelect.appendChild(opt);
            });
            if (sorted.includes(selected) || selected === 'all') routeSelect.value = selected;
        }
        populateDropdown(fallbackRoutes);

        async function loadLiveBuses() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Fetching live buses...';
            try {
                const feedUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://gtfs.halifax.ca/realtime/Vehicle/VehiclePositions.pb');
                const response = await fetch(feedUrl);
                if (!response.ok) throw new Error('Feed not available');
                const arrayBuffer = await response.arrayBuffer();
                const pbf = new Pbf(new Uint8Array(arrayBuffer));
                const feed = FeedMessage.read(pbf);

                busLayer.clearLayers();
                let count = 0;
                const liveRoutes = new Set();

                feed.entity.forEach(entity => {
                    if (entity.vehicle && entity.vehicle.position) {
                        const pos = entity.vehicle.position;
                        const vehiclePos = entity.vehicle;
                        const descriptor = vehiclePos.vehicle || {};
                        const busNumber = descriptor.label || descriptor.id || 'Unknown';

                        let routeId = null;
                        if (vehiclePos.trip) {
                            routeId = vehiclePos.trip.routeId || vehiclePos.trip.route_id || 
                                     (vehiclePos.trip.tripId ? vehiclePos.trip.tripId.split('-')[0] : null);
                        }
                        if (routeId) liveRoutes.add(String(routeId));

                        if (currentFilter !== 'all' && String(routeId) !== currentFilter) return;

                        const busIcon = L.divIcon({ className: 'bus-icon', html: '🚌', iconSize: [30, 30], iconAnchor: [15, 15] });
                        const marker = L.marker([pos.latitude, pos.longitude], { icon: busIcon }).addTo(busLayer);

                        let popupHTML = `<b>Bus ${busNumber}</b>`;
                        if (routeId) popupHTML += `<br>Route: ${routeId}`;
                        if (vehiclePos.trip && vehiclePos.trip.tripId) popupHTML += `<br>Trip: ${vehiclePos.trip.tripId}`;
                        marker.bindPopup(popupHTML);

                        count++;
                    }
                });

                const allRoutes = [...new Set([...fallbackRoutes, ...liveRoutes])];
                populateDropdown(allRoutes);

                document.getElementById('count').textContent = count;
                const now = new Date();
                statusEl.innerHTML = `✅ Updated just now<br><small>${now.toLocaleTimeString('en-CA')}</small>`;
            } catch (error) {
                console.error("Bus fetch error:", error);
                statusEl.textContent = '❌ Could not load buses — tap map to retry';
            }
        }

        loadLiveBuses();
        setInterval(loadLiveBuses, 20000);
        map.on('click', loadLiveBuses);

        // ==================== NEXT ARRIVALS BY STOP (with predicted + scheduled leave) ====================
        async function getNextArrivals() {
            const stopInput = document.getElementById('stopInput').value.trim();
            const resultsDiv = document.getElementById('arrivals-results');
            resultsDiv.innerHTML = '<p style="color:#0077cc;">Fetching predictions...</p>';

            if (!stopInput) {
                resultsDiv.innerHTML = '<p class="no-results">Please enter a stop number</p>';
                return;
            }

            try {
                const feedUrl = 'https://api.allorigins.win/raw?url=' + 
                    encodeURIComponent('https://gtfs.halifax.ca/realtime/TripUpdate/TripUpdates.pb');

                const response = await fetch(feedUrl);
                if (!response.ok) throw new Error('Feed not available');

                const arrayBuffer = await response.arrayBuffer();
                const pbf = new Pbf(new Uint8Array(arrayBuffer));
                const feed = FeedMessage.read(pbf);

                let arrivals = [];

                feed.entity.forEach(entity => {
                    if (entity.trip_update && entity.trip_update.stop_time_update) {
                        const trip = entity.trip_update.trip;
                        const vehicle = entity.trip_update.vehicle || {};
                        const busNumber = vehicle.label || vehicle.id || '—';

                        entity.trip_update.stop_time_update.forEach(stopUpdate => {
                            if (String(stopUpdate.stop_id) === stopInput) {
                                const departureEvent = stopUpdate.departure || stopUpdate.arrival;
                                if (departureEvent && departureEvent.time !== undefined) {
                                    const predictedUnix = departureEvent.time;
                                    const delaySeconds = departureEvent.delay !== undefined ? departureEvent.delay : 0;

                                    const scheduledUnix = predictedUnix - delaySeconds;

                                    const minutesAway = Math.round((predictedUnix * 1000 - Date.now()) / 60000);

                                    if (minutesAway >= 0) {
                                        const routeId = trip.routeId || trip.route_id || '—';
                                        arrivals.push({
                                            route: routeId,
                                            bus: busNumber,
                                            predictedLeave: predictedUnix,
                                            scheduledLeave: scheduledUnix,
                                            minutes: minutesAway
                                        });
                                    }
                                }
                            }
                        });
                    }
                });

                arrivals.sort((a, b) => a.minutes - b.minutes);

                if (arrivals.length === 0) {
                    resultsDiv.innerHTML = `<p class="no-results">No upcoming buses found for stop <strong>${stopInput}</strong> right now.</p>`;
                } else {
                    let html = `<p><strong>Stop ${stopInput}</strong> — ${arrivals.length} upcoming bus(es)</p>`;
                    arrivals.forEach(arr => {
                        const predTime = new Date(arr.predictedLeave * 1000).toLocaleTimeString('en-CA', {hour:'numeric', minute:'2-digit'});
                        const schedTime = new Date(arr.scheduledLeave * 1000).toLocaleTimeString('en-CA', {hour:'numeric', minute:'2-digit'});
                        const delayMin = Math.round((arr.predictedLeave - arr.scheduledLeave) / 60);

                        html += `
                            <div class="result-item">
                                <div><strong>Route ${arr.route}</strong> • Bus ${arr.bus}</div>
                                <div class="time-row">
                                    <div><span class="time-label">Predicted leave:</span> <strong>${predTime}</strong> (${arr.minutes} min)</div>
                                    <div><span class="time-label">Scheduled leave:</span> <strong>${schedTime}</strong></div>
                                </div>
                                ${delayMin !== 0 ? `<small style="color:${delayMin > 0 ? '#d32f2f' : '#388e3c'};">${delayMin > 0 ? '▲ ' + delayMin + ' min late' : '▼ ' + Math.abs(delayMin) + ' min early'}</small>` : '<small style="color:#388e3c;">On time</small>'}
                            </div>`;
                    });
                    resultsDiv.innerHTML = html;
                }
            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = `<p style="color:red;">❌ Could not load arrivals. Try again in a moment.</p>`;
            }
        }

        // Enter key support
        document.getElementById('stopInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getNextArrivals();
        });
    </script>
</body>
</html>
