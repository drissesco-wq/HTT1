<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halifax Transit Live • Real-Time Buses</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .header {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 12px 18px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
        .status {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 8px 14px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 14px;
        }
        .bus-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">🚏 Halifax Transit Live Map • <span id="count">0</span> buses on the road</div>
    <div class="status" id="status">Loading real-time buses...</div>
    <div id="map"></div>

    <!-- Required libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/pbf@3.0.5/dist/pbf.js"></script>
    <script src="https://unpkg.com/gtfs-realtime-pbf-js-module@1.0.0/gtfs-realtime.browser.proto.js"></script>

    <script>
        // Initialize map centered on Halifax
        const map = L.map('map').setView([44.65, -63.58], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors | Halifax Transit data'
        }).addTo(map);

        // Layer for bus markers
        const busLayer = L.layerGroup().addTo(map);

        let lastUpdate = null;

        async function loadLiveBuses() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Fetching live buses...';

            try {
                // CORS proxy (required because Halifax feed blocks direct browser access)
                const feedUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://gtfs.halifax.ca/realtime/Vehicle/VehiclePositions.pb');
                const response = await fetch(feedUrl);
                const arrayBuffer = await response.arrayBuffer();

                // Decode GTFS-RT protobuf
                const pbf = new Pbf(new Uint8Array(arrayBuffer));
                const feed = FeedMessage.read(pbf);

                // Clear old markers
                busLayer.clearLayers();

                let count = 0;

                feed.entity.forEach(entity => {
                    if (entity.vehicle && entity.vehicle.position) {
                        const pos = entity.vehicle.position;
                        const vehicle = entity.vehicle;

                        // Bus icon with emoji
                        const busIcon = L.divIcon({
                            className: 'bus-icon',
                            html: '🚌',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        const marker = L.marker([pos.latitude, pos.longitude], { icon: busIcon }).addTo(busLayer);

                        // Nice popup
                        let popupHTML = `<b>Bus ${vehicle.vehicle?.id || 'Unknown'}</b>`;
                        if (vehicle.trip && vehicle.trip.routeId) {
                            popupHTML += `<br>Route: ${vehicle.trip.routeId}`;
                        }
                        if (vehicle.trip && vehicle.trip.tripId) {
                            popupHTML += `<br>Trip: ${vehicle.trip.tripId}`;
                        }
                        if (pos.speed !== undefined) {
                            popupHTML += `<br>Speed: ${(pos.speed * 3.6).toFixed(0)} km/h`;
                        }
                        marker.bindPopup(popupHTML);

                        count++;
                    }
                });

                // Update header count
                document.getElementById('count').textContent = count;

                // Update status
                lastUpdate = new Date();
                statusEl.innerHTML = `✅ Updated just now<br><small>${lastUpdate.toLocaleTimeString('en-CA')}</small>`;

            } catch (error) {
                console.error(error);
                statusEl.textContent = '❌ Error loading buses (try refreshing)';
            }
        }

        // Load immediately + auto-refresh every 20 seconds
        loadLiveBuses();
        setInterval(loadLiveBuses, 20000);

        // Bonus: Click anywhere on map to manually refresh
        map.on('click', loadLiveBuses);
    </script>
</body>
</html>
