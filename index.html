<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halifax Transit Live • Real-Time Buses</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .header {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 12px 18px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 20px; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
        .filter {
            position: absolute; top: 70px; left: 10px; z-index: 1000;
            background: white; padding: 10px 14px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .status {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 8px 14px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 14px;
        }
        .bus-icon { font-size: 24px; }
        select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">🚏 Halifax Transit Live Map • <span id="count">0</span> buses on the road</div>
    
    <div class="filter">
        <label for="routeFilter"><strong>Filter by Route:</strong></label>
        <select id="routeFilter">
            <option value="all">All Routes</option>
        </select>
    </div>

    <div class="status" id="status">Loading real-time buses...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/pbf@3.0.5/dist/pbf.js"></script>
    <script src="https://unpkg.com/gtfs-realtime-pbf-js-module@1.0.0/gtfs-realtime.browser.proto.js"></script>

    <script>
        const map = L.map('map').setView([44.65, -63.58], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors | Halifax Transit data'
        }).addTo(map);

        const busLayer = L.layerGroup().addTo(map);
        let currentFilter = 'all';

        const routeSelect = document.getElementById('routeFilter');

        // Update filter when user selects a route
        routeSelect.addEventListener('change', () => {
            currentFilter = routeSelect.value;
            loadLiveBuses(); // re-render with new filter
        });

        async function loadLiveBuses() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Fetching live buses...';

            try {
                const feedUrl = 'https://api.allorigins.win/raw?url=' + 
                    encodeURIComponent('https://gtfs.halifax.ca/realtime/Vehicle/VehiclePositions.pb');

                const response = await fetch(feedUrl);
                if (!response.ok) throw new Error('Feed not available');

                const arrayBuffer = await response.arrayBuffer();
                const pbf = new Pbf(new Uint8Array(arrayBuffer));
                const feed = FeedMessage.read(pbf);

                busLayer.clearLayers();

                let count = 0;
                const routesSeen = new Set();

                feed.entity.forEach(entity => {
                    if (entity.vehicle && entity.vehicle.position) {
                        const pos = entity.vehicle.position;
                        const vehiclePos = entity.vehicle;

                        const descriptor = vehiclePos.vehicle || {};
                        const busNumber = descriptor.label || descriptor.id || 'Unknown';

                        const routeId = vehiclePos.trip ? vehiclePos.trip.routeId : null;

                        // Collect unique routes for dropdown
                        if (routeId) routesSeen.add(routeId);

                        // Apply filter
                        if (currentFilter !== 'all' && routeId !== currentFilter) {
                            return; // skip this bus
                        }

                        const busIcon = L.divIcon({
                            className: 'bus-icon',
                            html: '🚌',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        const marker = L.marker([pos.latitude, pos.longitude], { icon: busIcon }).addTo(busLayer);

                        let popupHTML = `<b>Bus ${busNumber}</b>`;
                        if (routeId) popupHTML += `<br>Route: ${routeId}`;
                        if (vehiclePos.trip && vehiclePos.trip.tripId) popupHTML += `<br>Trip: ${vehiclePos.trip.tripId}`;
                        if (pos.speed !== undefined) popupHTML += `<br>Speed: ${(pos.speed * 3.6).toFixed(0)} km/h`;
                        marker.bindPopup(popupHTML);

                        count++;
                    }
                });

                // Populate dropdown with all seen routes (sorted)
                const currentOptions = Array.from(routeSelect.options).map(opt => opt.value);
                const newRoutes = Array.from(routesSeen).sort((a, b) => {
                    return parseInt(a) - parseInt(b) || a.localeCompare(b);
                });

                // Only rebuild if routes changed (keeps selection intact)
                if (JSON.stringify(currentOptions.slice(1)) !== JSON.stringify(newRoutes)) {
                    routeSelect.innerHTML = '<option value="all">All Routes</option>';
                    newRoutes.forEach(route => {
                        const opt = document.createElement('option');
                        opt.value = route;
                        opt.textContent = `Route ${route}`;
                        routeSelect.appendChild(opt);
                    });
                }

                document.getElementById('count').textContent = count;
                const now = new Date();
                statusEl.innerHTML = `✅ Updated just now<br><small>${now.toLocaleTimeString('en-CA')}</small>`;

            } catch (error) {
                console.error("Bus fetch error:", error);
                statusEl.textContent = '❌ Could not load buses — tap map to retry';
            }
        }

        // Load immediately + every 20 seconds
        loadLiveBuses();
        setInterval(loadLiveBuses, 20000);

        // Click map to manually refresh
        map.on('click', loadLiveBuses);
    </script>
</body>
</html>
